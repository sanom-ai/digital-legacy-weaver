name: Beta Gate

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days"
        required: false
        default: "30"
      min_unlock_success_rate:
        description: "Minimum unlock success rate"
        required: false
        default: "0.90"
      min_unlock_sample_size:
        description: "Minimum unlock sample size"
        required: false
        default: "10"
      min_beneficiary_coverage:
        description: "Minimum beneficiary coverage"
        required: false
        default: "0.90"
      min_consent_coverage:
        description: "Minimum consent coverage"
        required: false
        default: "0.90"
      min_cohort_size_for_coverage_gate:
        description: "Minimum cohort size before enforcing coverage gates"
        required: false
        default: "10"
  schedule:
    - cron: "30 1 * * *"

jobs:
  beta-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve beta gate readiness
        id: readiness
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          $ready = (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) -and (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_SERVICE_ROLE_KEY))
          "ready=$($ready.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run security triage gate
        if: steps.readiness.outputs.ready == 'true'
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ./scripts/security_triage_report.ps1 -Hours 24 -FailOnCritical -WarnEventThreshold 50

      - name: Run beta gate report
        if: steps.readiness.outputs.ready == 'true'
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DAYS: ${{ github.event.inputs.days || '30' }}
          MIN_UNLOCK_SUCCESS_RATE: ${{ github.event.inputs.min_unlock_success_rate || '0.90' }}
          MIN_UNLOCK_SAMPLE_SIZE: ${{ github.event.inputs.min_unlock_sample_size || '10' }}
          MIN_BENEFICIARY_COVERAGE: ${{ github.event.inputs.min_beneficiary_coverage || '0.90' }}
          MIN_CONSENT_COVERAGE: ${{ github.event.inputs.min_consent_coverage || '0.90' }}
          MIN_COHORT_SIZE_FOR_COVERAGE_GATE: ${{ github.event.inputs.min_cohort_size_for_coverage_gate || '10' }}
        run: |
          ./scripts/beta_gate_report.ps1 -Days $env:DAYS -MinUnlockSuccessRate $env:MIN_UNLOCK_SUCCESS_RATE -MinUnlockSampleSize $env:MIN_UNLOCK_SAMPLE_SIZE -MinBeneficiaryCoverage $env:MIN_BENEFICIARY_COVERAGE -MinConsentCoverage $env:MIN_CONSENT_COVERAGE -MinCohortSizeForCoverageGate $env:MIN_COHORT_SIZE_FOR_COVERAGE_GATE -FailOnGate

      - name: Skip summary (missing secrets)
        if: steps.readiness.outputs.ready != 'true'
        shell: pwsh
        run: |
          "Beta Gate skipped: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY is not configured." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload beta gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-gate-reports
          path: |
            ops/reports/security-triage-*.md
            ops/reports/beta-gate-*.md
          if-no-files-found: ignore
