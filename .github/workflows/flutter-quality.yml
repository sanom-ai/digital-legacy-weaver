name: Flutter Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Format report (advisory)
        run: dart format --output=none lib test
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test
