name: digital_legacy_weaver
description: Private-first digital legacy and self-recovery app.
publish_to: "none"
version: 0.1.0-beta.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/verified_legal_partners.json
    - assets/config/verified_ecosystem_destinations.json
