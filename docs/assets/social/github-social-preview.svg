    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1110" cy="116" r="120" fill="#EBD9C3" opacity="0.3"/>
  <circle cx="124" cy="560" r="140" fill="#E3C59F" opacity="0.16"/>

  <text x="102" y="130" fill="#E8DCCB" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Digital Legacy Weaver</text>

