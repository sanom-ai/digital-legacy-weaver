  <text x="152" y="256" fill="#1D1916" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700">Private-first digital legacy coordination</text>
  <text x="152" y="308" fill="#5A5046" font-family="Segoe UI, Arial, sans-serif" font-size="28">Privacy presets, policy-driven delivery, and a clear technical-companion posture.</text>

  <rect x="152" y="364" width="218" height="46" rx="23" fill="#D9E8FF"/>
  <text x="188" y="394" fill="#2D4D79" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Highest privacy</text>
  <rect x="390" y="364" width="278" height="46" rx="23" fill="#E5D7C5"/>
  <text x="428" y="394" fill="#6A5138" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Recommended for beta</text>
  <rect x="688" y="364" width="206" height="46" rx="23" fill="#FFE4C7"/>
  <text x="726" y="394" fill="#8B5421" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Best for audits</text>

